<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 32" fill="none">
  <!-- Dotted X mark -->
  <!-- Row 1 (top) -->
  <circle cx="4"  cy="4"  r="2.2" fill="currentColor" opacity="0.9"/>
  <circle cx="10" cy="4"  r="1.8" fill="currentColor" opacity="0.6"/>
  <circle cx="22" cy="4"  r="1.8" fill="currentColor" opacity="0.6"/>
  <circle cx="28" cy="4"  r="2.2" fill="currentColor" opacity="0.9"/>
  <!-- Row 2 -->
  <circle cx="4"  cy="10" r="1.8" fill="currentColor" opacity="0.6"/>
  <circle cx="10" cy="10" r="2.2" fill="currentColor" opacity="0.9"/>
  <circle cx="22" cy="10" r="2.2" fill="currentColor" opacity="0.9"/>
  <circle cx="28" cy="10" r="1.8" fill="currentColor" opacity="0.6"/>
  <!-- Row 3 (middle) -->
  <circle cx="10" cy="16" r="1.6" fill="currentColor" opacity="0.4"/>
  <circle cx="16" cy="16" r="2.0" fill="currentColor" opacity="0.7"/>
  <circle cx="22" cy="16" r="1.6" fill="currentColor" opacity="0.4"/>
  <!-- Row 4 -->
  <circle cx="4"  cy="22" r="1.8" fill="currentColor" opacity="0.6"/>
  <circle cx="10" cy="22" r="2.2" fill="currentColor" opacity="0.9"/>
  <circle cx="22" cy="22" r="2.2" fill="currentColor" opacity="0.9"/>
  <circle cx="28" cy="22" r="1.8" fill="currentColor" opacity="0.6"/>
  <!-- Row 5 (bottom) -->
  <circle cx="4"  cy="28" r="2.2" fill="currentColor" opacity="0.9"/>
  <circle cx="10" cy="28" r="1.8" fill="currentColor" opacity="0.6"/>
  <circle cx="22" cy="28" r="1.8" fill="currentColor" opacity="0.6"/>
  <circle cx="28" cy="28" r="2.2" fill="currentColor" opacity="0.9"/>

  <!-- UPSCAPE wordmark -->
  <text x="38" y="22" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif" font-weight="700" font-size="16" letter-spacing="0.12em" fill="currentColor">UPSCAPE</text>
</svg>
